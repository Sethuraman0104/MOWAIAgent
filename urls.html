<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage URLs</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="js/api.js"></script>
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="app-header">
    <div class="logo-area animated-logo" onclick="logoRipple(event)">
        <div class="logo-bg">
            <img src="assets/mowlogo.png" class="logo-img" alt="Logo">
            <span class="shine"></span>
        </div>
        <span class="logo-text">MOW AI - URLs</span>
    </div>

    <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back
    </a>
</header>

<!-- ================= ADD URL ================= -->
<section class="glass-card add-url-section">
    <h2 class="section-title">
        <i class="fas fa-link"></i> Add New URL
    </h2>

    <div class="form-row">
        <div class="form-group">
            <label for="urlTitle">URL Title</label>
            <input type="text" id="urlTitle" class="glass-input" placeholder="Enter URL title">
        </div>

        <div class="form-group">
            <label for="urlInput">URL</label>
            <input type="text" id="urlInput" class="glass-input" placeholder="https://example.com">
        </div>

        <div class="form-group add-btn-group">
            <button class="btn-primary" onclick="addUrl()">
                <i class="fas fa-plus"></i> Add URL
            </button>
        </div>
    </div>
</section>


<!-- ================= URL LIST ================= -->
<section class="glass-card">
    <div class="table-header">
        <h2><i class="fas fa-list"></i> All URLs</h2>
        <input type="text" id="searchInput" placeholder="Search URLs...">
    </div>

    <div class="table-wrapper">
        <table id="urlsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>URL</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="emptyState" class="empty-state hidden">
    <i class="fas fa-link"></i>
    <h3>No URLs Found</h3>
    <p>Add your first URL using the form above.</p>
</div>
    </div>

    <div class="pagination">
        <button onclick="prevPage()">Prev</button>
        <span id="pageInfo"></span>
        <button onclick="nextPage()">Next</button>
    </div>
</section>

<div id="customAlert" class="custom-alert hidden">
    <div class="alert-box">

        <div class="alert-icon success" id="alertIcon">
            <i class="fas fa-circle-check"></i>
        </div>

        <h3 id="alertTitle">Info</h3>

        <p id="alertMessage">Message</p>

        <div class="alert-actions" id="alertActions">
            <button class="alert-btn ok" onclick="closeAlert()">OK</button>
        </div>

    </div>
</div>

<!-- ================= LOADING OVERLAY ================= -->
<div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-box">

        <div class="loading-spinner"></div>

        <h3>Embedding URL...</h3>

        <p>Please wait while AI processes the website content.</p>

    </div>
</div>

<script>

/* ================= ALERT SYSTEM ================= */

let confirmResolve = null;

function showAlert(type, title, message) {

    const modal = document.getElementById('customAlert');
    const icon = document.getElementById('alertIcon');
    const titleEl = document.getElementById('alertTitle');
    const msgEl = document.getElementById('alertMessage');
    const actions = document.getElementById('alertActions');

    // RESET ACTIONS
    actions.innerHTML = `
        <button class="alert-btn ok" onclick="closeAlert()">
            OK
        </button>
    `;

    // ICON
    icon.className = 'alert-icon ' + type;

    if (type === 'success') {
        icon.innerHTML = '<i class="fas fa-circle-check"></i>';
    }
    else if (type === 'error') {
        icon.innerHTML = '<i class="fas fa-circle-xmark"></i>';
    }
    else {
        icon.innerHTML = '<i class="fas fa-triangle-exclamation"></i>';
    }

    titleEl.textContent = title;
    msgEl.textContent = message;

    modal.classList.remove('hidden');
}

function closeAlert() {

    document.getElementById('customAlert')
        .classList.add('hidden');

    confirmResolve = null;
}

/* ================= CONFIRM MODAL ================= */

function showConfirm(title, message) {

    return new Promise(resolve => {

        confirmResolve = resolve;

        const modal = document.getElementById('customAlert');
        const icon = document.getElementById('alertIcon');
        const titleEl = document.getElementById('alertTitle');
        const msgEl = document.getElementById('alertMessage');
        const actions = document.getElementById('alertActions');

        icon.className = 'alert-icon warning';
        icon.innerHTML =
            '<i class="fas fa-triangle-exclamation"></i>';

        titleEl.textContent = title;
        msgEl.textContent = message;

        actions.innerHTML = `
            <button class="alert-btn cancel"
                onclick="resolveConfirm(false)">
                Cancel
            </button>

            <button class="alert-btn ok"
                onclick="resolveConfirm(true)">
                Delete
            </button>
        `;

        modal.classList.remove('hidden');
    });
}

function resolveConfirm(value) {

    document.getElementById('customAlert')
        .classList.add('hidden');

    if (confirmResolve) {
        confirmResolve(value);
    }

    confirmResolve = null;
}

/* ================= LOADER ================= */

function showLoader(message = "Loading...") {

    const overlay =
        document.getElementById('loadingOverlay');

    overlay.querySelector('h3').innerText = message;

    overlay.classList.remove('hidden');
}

function hideLoader() {

    document.getElementById('loadingOverlay')
        .classList.add('hidden');
}

/* ================= DATA ================= */

let urls = [];
let currentPage = 1;
const pageSize = 6;

/* ================= LOAD URLS ================= */

async function loadUrls() {

    showLoader("Loading Embedded URLs...");

    try {

        urls = await apiGet('/api/urls/list');

        currentPage = 1;

        renderTable();
    }
    catch (err) {

        console.error(err);

        showAlert(
            'error',
            'Load Failed',
            'Unable to load URLs from the server.'
        );
    }
    finally {

        hideLoader();
    }
}

/* ================= RENDER TABLE ================= */

function renderTable() {

    const tbody =
        document.querySelector('#urlsTable tbody');

    const emptyState =
        document.getElementById('emptyState');

    const search =
        document.getElementById('searchInput')
        .value
        .toLowerCase();

    const filtered = urls.filter(u =>
        (u.title || '')
            .toLowerCase()
            .includes(search)
        ||
        (u.url || '')
            .toLowerCase()
            .includes(search)
    );

    // EMPTY STATE
    if (filtered.length === 0) {

        tbody.innerHTML = '';

        emptyState.classList.remove('hidden');

        document.getElementById('pageInfo')
            .innerText = '';

        return;
    }

    emptyState.classList.add('hidden');

    const start =
        (currentPage - 1) * pageSize;

    const pageData =
        filtered.slice(start, start + pageSize);

    tbody.innerHTML = '';

    pageData.forEach(u => {

        tbody.innerHTML += `
        <tr>

            <td>${u.urlId}</td>

            <td>${u.title}</td>

            <td>
                <a href="${u.url}"
                   target="_blank"
                   class="url-link">
                    ${u.url}
                </a>
            </td>

            <td>
                <button class="btn-danger"
                    onclick="deleteUrl(${u.urlId})">

                    <i class="fas fa-trash"></i>

                </button>
            </td>

        </tr>`;
    });

    const totalPages =
        Math.ceil(filtered.length / pageSize) || 1;

    document.getElementById('pageInfo')
        .innerText =
        `Page ${currentPage} of ${totalPages}`;
}

/* ================= PAGINATION ================= */

function nextPage() {

    if (currentPage * pageSize < urls.length) {

        currentPage++;

        renderTable();
    }
}

function prevPage() {

    if (currentPage > 1) {

        currentPage--;

        renderTable();
    }
}

/* ================= SEARCH ================= */

document
    .getElementById('searchInput')
    .addEventListener('input', () => {

        currentPage = 1;

        renderTable();
    });

/* ================= ADD URL ================= */

async function addUrl() {

    const url =
        document.getElementById('urlInput')
        .value
        .trim();

    const title =
        document.getElementById('urlTitle')
        .value
        .trim();

    if (!url || !title) {

        showAlert(
            'warning',
            'Validation Error',
            'Title and URL are required.'
        );

        return;
    }

    showLoader("Embedding URL...");

    try {

        const result = await apiPost(
            '/api/urls/add',
            {
                url,
                title
            }
        );

        if (result.success) {

            // CLEAR INPUTS
            document.getElementById('urlInput').value = '';
            document.getElementById('urlTitle').value = '';

            // RELOAD TABLE
            await loadUrls();

            // SUCCESS ALERT
            showAlert(
                'success',
                'URL Embedded',
                'Website content embedded successfully.'
            );
        }
        else {

            showAlert(
                'error',
                'Add URL Failed',
                result.error || 'Unable to add URL.'
            );
        }
    }
    catch (err) {

        console.error(err);

        showAlert(
            'error',
            'Add URL Failed',
            err.message || 'Something went wrong.'
        );
    }
    finally {

        hideLoader();
    }
}

/* ================= DELETE URL ================= */

async function deleteUrl(id) {

    const confirmed = await showConfirm(
        'Delete URL',
        'Are you sure you want to delete this URL?'
    );

    if (!confirmed)
        return;

    showLoader("Deleting URL...");

    try {

        // ✅ USE POST INSTEAD OF DELETE
        const result = await apiPost(
            '/api/urls/delete',
            {
                id: id
            }
        );

        if (result.success) {

            await loadUrls();

            showAlert(
                'success',
                'URL Deleted',
                'URL deleted successfully.'
            );
        }
        else {

            showAlert(
                'error',
                'Delete Failed',
                result.error || 'Unable to delete URL.'
            );
        }
    }
    catch (err) {

        console.error(err);

        showAlert(
            'error',
            'Delete Failed',
            err.message || 'Unable to delete URL.'
        );
    }
    finally {

        hideLoader();
    }
}

/* ================= INIT ================= */

loadUrls();

/* ================= LOGO RIPPLE ================= */

function logoRipple(e) {

    const bg =
        e.currentTarget.querySelector('.logo-bg');

    const ripple =
        document.createElement('span');

    ripple.style.position = 'absolute';
    ripple.style.width = '20px';
    ripple.style.height = '20px';
    ripple.style.borderRadius = '50%';
    ripple.style.background = 'rgba(255,255,255,.6)';
    ripple.style.left = (e.offsetX) + 'px';
    ripple.style.top = (e.offsetY) + 'px';
    ripple.style.transform = 'scale(1)';
    ripple.style.opacity = '1';
    ripple.style.transition = 'all .6s ease';

    bg.appendChild(ripple);

    setTimeout(() => {

        ripple.style.transform = 'scale(15)';
        ripple.style.opacity = '0';

    }, 10);

    setTimeout(() => ripple.remove(), 600);
}

</script>

</body>
</html>
