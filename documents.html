<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Documents</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="js/api.js"></script>
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="app-header">
    <div class="logo-area animated-logo" onclick="logoRipple(event)">
        <div class="logo-bg">
            <img src="assets/mowlogo.png" class="logo-img" alt="Logo">
            <span class="shine"></span>
        </div>
        <span class="logo-text">MOW AI - Documents</span>
    </div>

    <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back
    </a>
</header>

<!-- ================= ADD DOCUMENT ================= -->
<section class="glass-card">
    <h2><i class="fas fa-upload"></i> Upload New Document</h2>

    <div class="upload-row">
        <div class="file-upload">
    <input type="file" id="docFile">
    <label for="docFile" class="file-label">
        <i class="fas fa-file-upload"></i>
        <span class="file-text">Choose Document</span>
    </label>
</div>
        <button class="btn-primary" onclick="uploadDocument()">
            <i class="fas fa-cloud-upload-alt"></i> Upload
        </button>
    </div>
</section>

<!-- ================= DOCUMENT LIST ================= -->
<section class="glass-card">
    <div class="table-header">
        <h2><i class="fas fa-list"></i> All Documents</h2>
        <input type="text" id="searchInput" placeholder="Search documents...">
    </div>

    <div class="table-wrapper">
        <table id="documentsTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Created At</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div id="emptyState" class="empty-state hidden">
    <i class="fas fa-file-alt"></i>
    <h3>No Documents Found</h3>
    <p>Upload your first document to get started.</p>
</div>
    </div>

    <div class="pagination">
        <button onclick="prevPage()">Prev</button>
        <span id="pageInfo"></span>
        <button onclick="nextPage()">Next</button>
    </div>
</section>

<!-- ================= CUSTOM ALERT ================= -->
<div id="customAlert" class="custom-alert hidden">
    <div class="alert-box">

        <div class="alert-icon" id="alertIcon">
            <i class="fas fa-circle-check"></i>
        </div>

        <h3 id="alertTitle">Success</h3>

        <p id="alertMessage">
            Uploaded successfully
        </p>

        <div class="alert-actions" id="alertActions">
            <button class="alert-btn ok" onclick="closeAlert(true)">
                OK
            </button>
        </div>

    </div>
</div>

<!-- ================= LOADING OVERLAY ================= -->
<div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-box">

        <div class="loading-spinner"></div>

        <h3>Uploading Document...</h3>

        <p>Please wait while your document is being processed.</p>

    </div>
</div>

<!-- ================= SCRIPT ================= -->
<script>
let documents = [];
let currentPage = 1;
const pageSize = 6;

/* ================= CUSTOM ALERT ================= */

let alertCallback = null;

function showAlert(type, title, message, confirmMode = false){

    const modal = document.getElementById('customAlert');
    const icon  = document.getElementById('alertIcon');
    const titleEl = document.getElementById('alertTitle');
    const msgEl = document.getElementById('alertMessage');
    const actions = document.getElementById('alertActions');

    icon.className = 'alert-icon ' + type;

    if(type === 'success'){
        icon.innerHTML = '<i class="fas fa-circle-check"></i>';
    }
    else if(type === 'error'){
        icon.innerHTML = '<i class="fas fa-circle-xmark"></i>';
    }
    else{
        icon.innerHTML = '<i class="fas fa-triangle-exclamation"></i>';
    }

    titleEl.textContent = title;
    msgEl.textContent = message;

    if(confirmMode){

        actions.innerHTML = `
            <button class="alert-btn cancel" onclick="closeAlert(false)">
                Cancel
            </button>

            <button class="alert-btn ok" onclick="closeAlert(true)">
                Confirm
            </button>
        `;
    }
    else{

        actions.innerHTML = `
            <button class="alert-btn ok" onclick="closeAlert(true)">
                OK
            </button>
        `;
    }

    modal.classList.remove('hidden');
}

function closeAlert(result){

    document.getElementById('customAlert')
        .classList.add('hidden');

    if(alertCallback){
        alertCallback(result);
        alertCallback = null;
    }
}

function showConfirm(title, message){

    return new Promise(resolve => {

        alertCallback = resolve;

        showAlert(
            'warning',
            title,
            message,
            true
        );
    });
}


/* ================= LOADING ================= */

function showLoader(title = "Loading...", message = "Please wait...") {

    const overlay =
        document.getElementById('loadingOverlay');

    overlay.querySelector('h3').innerText = title;
    overlay.querySelector('p').innerText = message;

    overlay.classList.remove('hidden');
}

function hideLoader() {

    document
        .getElementById('loadingOverlay')
        .classList.add('hidden');
}

async function loadDocuments(){

    // ✅ SHOW LOADER FOR DOCUMENT LIST
    showLoader(
        "Loading Documents...",
        "Fetching embedded documents from server."
    );

    try{

        documents =
            await apiGet('/api/ai-docs/list');

        currentPage = 1;

        renderTable();
    }
    catch(err){

        console.error(err);

        showAlert(
            'error',
            'Load Failed',
            'Unable to load documents from the server.'
        );
    }
    finally{

        // ✅ ALWAYS HIDE LOADER
        hideLoader();
    }
}

function renderTable(){
    const tbody = document.querySelector('#documentsTable tbody');
    const emptyState = document.getElementById('emptyState');

    const search = document.getElementById('searchInput').value.toLowerCase();

    const filtered = documents.filter(d =>
        d.title.toLowerCase().includes(search)
    );

    // ✅ EMPTY STATE HANDLING
    if (filtered.length === 0) {
        tbody.innerHTML = '';
        emptyState.classList.remove('hidden');
        document.getElementById('pageInfo').innerText = '';
        return;
    } else {
        emptyState.classList.add('hidden');
    }

    const start = (currentPage - 1) * pageSize;
    const pageData = filtered.slice(start, start + pageSize);

    tbody.innerHTML = '';
    pageData.forEach(d => {
        tbody.innerHTML += `
        <tr>
            <td>${d.documentId}</td>
            <td>${d.title}</td>
            <td>${new Date(d.createdAt).toLocaleString()}</td>
            <td>
                <button class="btn-danger" onclick="deleteDocument(${d.documentId})">
                    <i class="fas fa-trash"></i>
                </button>
            </td>
        </tr>`;
    });

    const totalPages = Math.ceil(filtered.length / pageSize) || 1;
    document.getElementById('pageInfo').innerText =
        `Page ${currentPage} of ${totalPages}`;
}

function nextPage(){
    currentPage++;
    renderTable();
}

function prevPage(){
    if(currentPage > 1){
        currentPage--;
        renderTable();
    }
}

document.getElementById('searchInput').addEventListener('input', () => {
    currentPage = 1;
    renderTable();
});

async function uploadDocument(){

    const fileInput = document.getElementById('docFile');
    const file = fileInput.files[0];

    if(!file){

        showAlert(
            'warning',
            'No File Selected',
            'Please choose a document first.'
        );

        return;
    }

    const formData = new FormData();
    formData.append('file', file);

    // ✅ SHOW LOADER
    showLoader();

    try{

        await apiPostForm('/api/ai-docs/upload', formData);

        // ✅ HIDE LOADER
        hideLoader();

        showAlert(
            'success',
            'Upload Complete',
            'Document uploaded successfully.'
        );

        // ✅ RESET FILE INPUT
        const fileText = document.querySelector('.file-text');
        const fileWrap = document.querySelector('.file-upload');

        fileInput.value = '';
        fileText.textContent = 'Choose Document';
        fileWrap.classList.remove('selected');

        // ✅ RELOAD TABLE
        loadDocuments();

    }
    catch(err){

        // ✅ HIDE LOADER ON ERROR
        hideLoader();

        console.error(err);

        showAlert(
            'error',
            'Upload Failed',
            'Unable to upload document.'
        );
    }
}

async function deleteDocument(id){

    const confirmed = await showConfirm(
        'Delete Document',
        'Are you sure you want to delete this document?'
    );

    if(!confirmed)
        return;

    showLoader("Deleting Document...");

    try{

        // ✅ USE POST INSTEAD OF DELETE
        const result = await apiPost(
            '/api/ai-docs/delete',
            {
                id: id
            }
        );

        if(result.success){

            await loadDocuments();

            showAlert(
                'success',
                'Document Deleted',
                'Document deleted successfully.'
            );
        }
        else{

            showAlert(
                'error',
                'Delete Failed',
                result.error || 'Unable to delete document.'
            );
        }
    }
    catch(err){

        console.error(err);

        showAlert(
            'error',
            'Delete Failed',
            err.message || 'Unable to delete the document.'
        );
    }
    finally{

        hideLoader();
    }
}


loadDocuments();

const fileInput = document.getElementById('docFile');
const fileText  = document.querySelector('.file-text');
const fileWrap  = document.querySelector('.file-upload');

fileInput.addEventListener('change', () => {
    if (fileInput.files.length > 0) {
        fileText.textContent = fileInput.files[0].name;
        fileWrap.classList.add('selected');
    } else {
        fileText.textContent = 'Choose Document';
        fileWrap.classList.remove('selected');
    }
});

function logoRipple(e){
    const bg = e.currentTarget.querySelector('.logo-bg');
    const ripple = document.createElement('span');

    ripple.style.position='absolute';
    ripple.style.width='20px';
    ripple.style.height='20px';
    ripple.style.borderRadius='50%';
    ripple.style.background='rgba(255,255,255,.6)';
    ripple.style.left=(e.offsetX)+'px';
    ripple.style.top=(e.offsetY)+'px';
    ripple.style.transform='scale(1)';
    ripple.style.opacity='1';
    ripple.style.transition='all .6s ease';

    bg.appendChild(ripple);

    setTimeout(()=>{
        ripple.style.transform='scale(15)';
        ripple.style.opacity='0';
    },10);

    setTimeout(()=>ripple.remove(),600);
}
</script>

</body>
</html>
